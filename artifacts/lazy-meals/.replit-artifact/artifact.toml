kind = "web"
previewPath = "/"
title = "Lazy Meals"
version = "1.0.0"
id = "artifacts/lazy-meals"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24917

[services.development]
run = "pnpm --filter @workspace/lazy-meals run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lazy-meals", "run", "build" ]
publicDir = "artifacts/lazy-meals/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24917"
BASE_PATH = "/"
